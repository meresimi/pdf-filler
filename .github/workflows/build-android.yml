name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12266719
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: true
        packages: 'tools platform-tools build-tools;33.0.2 platforms;android-33'
    
    - name: Install Gradle 8.7
      run: |
        wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        sudo rm -rf /usr/share/gradle-9.3.0
        sudo mv gradle-8.7 /usr/share/
        sudo ln -sf /usr/share/gradle-8.7/bin/gradle /usr/bin/gradle
        gradle --version
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Install dependencies
      run: npm install
    
    - name: Add Android platform
      run: cordova platform add android
    
    - name: Build Android APK with Gradle 8.7
      run: |
        cd platforms/android
        gradle assembleRelease --no-daemon
    
    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"
    
    - name: Sign APK
      run: |
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore debug.keystore -storepass android -keypass android \
          platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
          androiddebugkey
    
    - name: Verify APK signature
      run: jarsigner -verify -verbose platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
    
    - name: Zipalign APK
      run: |
        $ANDROID_HOME/build-tools/33.0.2/zipalign -v 4 \
          platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
          platforms/android/app/build/outputs/apk/release/pdf-editor-signed.apk
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: pdf-editor-signed
        path: platforms/android/app/build/outputs/apk/release/pdf-editor-signed.apk 
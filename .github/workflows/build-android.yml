name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync Android
        run: npx cap sync android

      # ── Icons: copy all mipmap folders and XML into the Android project ──────
      - name: Inject launcher icons
        run: |
          RES=android/app/src/main/res

          # Copy mipmap PNGs
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $RES/mipmap-${density}
            cp android-assets/mipmap-${density}/ic_launcher.png           $RES/mipmap-${density}/ic_launcher.png
            cp android-assets/mipmap-${density}/ic_launcher_round.png     $RES/mipmap-${density}/ic_launcher_round.png
            cp android-assets/mipmap-${density}/ic_launcher_foreground.png $RES/mipmap-${density}/ic_launcher_foreground.png
          done

          # Adaptive icon XMLs (API 26+)
          mkdir -p $RES/mipmap-anydpi-v26
          cp android-assets/mipmap-anydpi-v26/ic_launcher.xml       $RES/mipmap-anydpi-v26/ic_launcher.xml
          cp android-assets/mipmap-anydpi-v26/ic_launcher_round.xml  $RES/mipmap-anydpi-v26/ic_launcher_round.xml

          # Background color resource
          mkdir -p $RES/values
          cp android-assets/values/ic_launcher_background.xml $RES/values/ic_launcher_background.xml

      # ── Splash screen icon ────────────────────────────────────────────────────
      - name: Inject splash icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp android-assets/splash.png android/app/src/main/res/drawable/splash.png

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Rename output to PDF-Filler.apk ──────────────────────────────────────
      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/PDF-Filler.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Filler-debug
          path: android/app/build/outputs/apk/debug/PDF-Filler.apk
          retention-days: 14

  # ── Release build (only on version tags) ─────────────────────────────────────
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Inject launcher icons
        run: |
          RES=android/app/src/main/res
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $RES/mipmap-${density}
            cp android-assets/mipmap-${density}/ic_launcher.png            $RES/mipmap-${density}/ic_launcher.png
            cp android-assets/mipmap-${density}/ic_launcher_round.png      $RES/mipmap-${density}/ic_launcher_round.png
            cp android-assets/mipmap-${density}/ic_launcher_foreground.png $RES/mipmap-${density}/ic_launcher_foreground.png
          done
          mkdir -p $RES/mipmap-anydpi-v26
          cp android-assets/mipmap-anydpi-v26/ic_launcher.xml      $RES/mipmap-anydpi-v26/ic_launcher.xml
          cp android-assets/mipmap-anydpi-v26/ic_launcher_round.xml $RES/mipmap-anydpi-v26/ic_launcher_round.xml
          mkdir -p $RES/values
          cp android-assets/values/ic_launcher_background.xml $RES/values/ic_launcher_background.xml

      - name: Inject splash icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp android-assets/splash.png android/app/src/main/res/drawable/splash.png

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/PDF-Filler.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Filler-release
          path: android/app/build/outputs/apk/release/PDF-Filler.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/PDF-Filler.apk
          name: PDF Filler ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

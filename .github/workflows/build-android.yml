name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12266719
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: true
        packages: 'tools platform-tools'
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Install dependencies
      run: npm install
    
    - name: Add Android platform
      run: cordova platform add android
    
    - name: Create Gradle wrapper with compatible version
      run: |
        cd platforms/android
        gradle wrapper --gradle-version 8.7 --distribution-type bin
    
    - name: Make gradlew executable
      run: chmod +x platforms/android/gradlew
    
    - name: Build Android APK
      run: cordova build android --release -- --gradleArg=--no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
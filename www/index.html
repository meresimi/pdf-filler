<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Editor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="welcomeScreen" class="container">
        <h1>PDF Form Editor</h1>
        <p>Select a PDF file to start editing</p>
        <button id="welcomeOpenBtn" class="btn">📄 Open PDF File</button>
    </div>

    <div id="pdfViewer" style="display: none;">
        <div id="toolbar">
            <button id="openFileBtn" class="btn">Open File</button>
            <button id="prevPageBtn" class="btn">Previous</button>
            <span id="pageInfo"></span>
            <button id="nextPageBtn" class="btn">Next</button>
            <button id="zoomOutBtn" class="btn">-</button>
            <button id="zoomInBtn" class="btn">+</button>
            <button id="saveBtn" class="btn">Save PDF</button>
        </div>

        <div id="mainContent">
            <div id="canvasContainer">
                <canvas id="pdfCanvas"></canvas>
            </div>

            <div id="editorPanel" style="display: none;">
                <h3>Editor Tools</h3>
                <button id="addTextBtn" class="btn">Add Text</button>
                <button id="addCheckBtn" class="btn">Add Checkbox</button>
                <button id="clearBtn" class="btn">Clear All</button>

                <div id="textInputPanel" style="display: none;">
                    <input type="text" id="textInput" placeholder="Enter text">
                    <button id="addTextConfirm" class="btn">Add</button>
                    <button id="cancelText" class="btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingIndicator" style="display: none;">
        <p>Loading...</p>
    </div>

    <input type="file" id="fileInput" accept="application/pdf" style="display: none;">

    <!-- Use CDN for PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <script type="text/javascript" src="cordova.js"></script>
    <script src="js/pdfHandler.js"></script>
    <script src="js/formEditor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: blob:;">
    <title>PDF Editor</title>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <h1>PDF Editor</h1>
        <button id="openFileBtn" class="btn btn-primary">
            <span>📁</span> Open PDF
        </button>
    </header>

    <!-- Main Content -->
    <main class="app-content">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-content">
                <h2>Welcome to PDF Editor</h2>
                <p>Open a PDF file to view and edit forms</p>
                <button id="welcomeOpenBtn" class="btn btn-large">
                    <span>📄</span> Open PDF File
                </button>
            </div>
        </div>

        <!-- PDF Viewer -->
        <div id="pdfViewer" class="pdf-viewer" style="display: none;">
            <div class="pdf-toolbar">
                <button id="prevPageBtn" class="btn">◀ Previous</button>
                <span id="pageInfo" class="page-info">Page 1 of 1</span>
                <button id="nextPageBtn" class="btn">Next ▶</button>
                <button id="zoomOutBtn" class="btn">🔍-</button>
                <span id="zoomLevel" class="zoom-level">100%</span>
                <button id="zoomInBtn" class="btn">🔍+</button>
                <button id="saveBtn" class="btn btn-success">💾 Save</button>
            </div>
            
            <div class="pdf-canvas-container">
                <canvas id="pdfCanvas"></canvas>
                <div id="annotationLayer" class="annotation-layer"></div>
            </div>
        </div>

        <!-- Form Editor Panel -->
        <div id="editorPanel" class="editor-panel" style="display: none;">
            <h3>Edit Mode</h3>
            <div class="editor-tools">
                <button id="addTextBtn" class="tool-btn">
                    <span>📝</span> Add Text
                </button>
                <button id="addCheckBtn" class="tool-btn">
                    <span>✓</span> Add Checkbox
                </button>
                <button id="clearBtn" class="tool-btn btn-danger">
                    <span>🗑️</span> Clear All
                </button>
            </div>
            <div id="textInput" class="text-input-group" style="display: none;">
                <input type="text" id="textField" placeholder="Enter text...">
                <button id="addTextConfirm" class="btn btn-small">Add</button>
                <button id="cancelText" class="btn btn-small">Cancel</button>
            </div>
        </div>
    </main>

    <!-- File Input (Hidden) -->
    <input type="file" id="fileInput" accept=".pdf" style="display: none;">

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator" style="display: none;">
        <div class="spinner"></div>
        <p>Loading PDF...</p>
    </div>

    <!-- Scripts -->
    <script type="text/javascript" src="cordova.js"></script>
    <script src="lib/pdf.min.js"></script>
    <script src="lib/pdf-lib.min.js"></script>
    <script src="js/pdfHandler.js"></script>
    <script src="js/formEditor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
